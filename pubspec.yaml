name: calorie_tracker
description: "Protein-first nutrition tracker for Latin America."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.5.0

  # State management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Functional types
  dartz: ^0.10.1

  # DI
  get_it: ^7.7.0
  injectable: ^2.4.2

  # Immutable models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Routing
  go_router: ^14.2.0

  # Secure storage (replaces shared_preferences for sensitive data)
  flutter_secure_storage: ^9.2.2

  # Push notifications (Firebase — only bits we keep)
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3

  # Auth providers (UI-side — required regardless of OAuth strategy)
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^7.0.1

  # Local notifications (for reminders later)
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.4

  # Charts
  fl_chart: ^0.68.0

  # HTTP + env
  http: ^1.2.2
  flutter_dotenv: ^5.1.0

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.12
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  injectable_generator: ^2.6.2

  # Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

  # Lints
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env